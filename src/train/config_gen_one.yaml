entity: "ip-ai"
wandb_project: train-inv-gen-one
model_name: "openai/gpt-oss-20b"
hf_dataset: "idopinto/invbench-training-uautomizer25-k1-gen-one"
limit: 20 # 3,903

# datasets
# idopinto/invbench-training-uautomizer25-k1-gen-one (3907)
# idopinto/invbench-training-uautomizer25-k1-gen-all (3128)
# idopinto/gen-inv-sft-for-gpt-oss-full-sep2 (3,903) - deprected
# idopinto/gen-inv-sft-for-gpt-oss-full2 (3,125) - deprecated

sft_config:
  # Option 1: Evaluate every 4 steps (will trigger at least once)
  eval_strategy: "steps"
  eval_steps: 30
  
  # Option 2: Evaluate at end of each epoch (simpler)
  # eval_strategy: "epoch"
  # (remove eval_steps or set to null)
  # assistant_only_loss: True 
  learning_rate: 0.0002
  gradient_checkpointing: True
  num_train_epochs: 3
  # max_steps: 30
  logging_steps: 1
  per_device_train_batch_size: 12
  gradient_accumulation_steps: 6
  max_length: 1024
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine_with_min_lr"
  lr_scheduler_kwargs: {"min_lr_rate": 0.1}
  output_dir: "gpt-oss-20b-gen-one-inv-sft-test"
  report_to: "wandb"
  push_to_hub: True

lora_config:
  r: 8
  lora_alpha: 16
  target_modules: "all-linear"
  target_parameters:
    - "7.mlp.experts.gate_up_proj"
    - "7.mlp.experts.down_proj"
    - "15.mlp.experts.gate_up_proj"
    - "15.mlp.experts.down_proj"
    - "23.mlp.experts.gate_up_proj"
    - "23.mlp.experts.down_proj"
  lora_dropout: 0.0
  bias: "none"
  task_type: "CAUSAL_LM"


model_train_config:
  attn_implementation: "eager"
  dtype: "bfloat16"
  use_cache: False
  device_map: "auto"

model_eval_config:
  max_new_tokens: 16384
  do_sample: True
  temperature: 1.0
  top_p: 1.0
  top_k: 0.0