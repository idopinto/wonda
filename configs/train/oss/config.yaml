wandb:
  entity: "ip-ai"
  project: train-inv-gen
  name: train-inv-gen-perloc

model:
  base_model_name: "openai/gpt-oss-20b"
  init_kwargs_train:
    attn_implementation: "eager"
    use_cache: False
    device_map: "auto"
  inference:
    sampling_params:
      max_new_tokens: 16384
      temperature: 1.0
      top_p: 1.0
      top_k: 0.0
    reasoning_effort: "low"

dataset:
  name: "idopinto/invbench-train-uautomizer25-k1-perloc-full-cleaned"
  limit: -1 # 3,903

sft:
  # Option 1: Evaluate every 4 steps (will trigger at least once)
  eval_strategy: "steps"
  eval_steps: 20
  
  # Option 2: Evaluate at end of each epoch (simpler)
  # eval_strategy: "epoch"
  # (remove eval_steps or set to null)
  # assistant_only_loss: True 
  learning_rate: 0.0002
  gradient_checkpointing: True
  num_train_epochs: 3
  # max_steps: 30
  logging_steps: 1
  per_device_train_batch_size: 12
  gradient_accumulation_steps: 4
  max_length: 1024
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine_with_min_lr"
  lr_scheduler_kwargs: {"min_lr_rate": 0.1}
  output_dir: "trained_models/gpt-oss-20b-gen-inv-sft-perloc"
  report_to: "wandb"
  push_to_hub: True

lora:
  r: 8
  lora_alpha: 16
  target_modules: "all-linear"
  target_parameters:
    - "7.mlp.experts.gate_up_proj"
    - "7.mlp.experts.down_proj"
    - "15.mlp.experts.gate_up_proj"
    - "15.mlp.experts.down_proj"
    - "23.mlp.experts.gate_up_proj"
    - "23.mlp.experts.down_proj"
  lora_dropout: 0.0
  bias: "none"
  task_type: "CAUSAL_LM"

prompts:
  system: |
    You are an expert C programmer and highly profiecient in generating strong loop invariants for C programs that accelerates traditional verifiers.
    
  per_location_user_prompt_template: |
      You are given a C program instrumented with loop markers of the form:
      - INVARIANT_MARKER_k();  (appears at the *start of each loop body*)
      The program also contains a target property as a normal assertion:
      - assert(<target_property>);

      Task:
      - Propose ONE loop invariant that is intended to hold specifically at the loop head marker:
        INVARIANT_MARKER_{target_label}
      - The invariant should help prove the target property and be inductive if possible.

      Output format (STRICT JSON):
      - Output MUST be a single JSON object on one line and nothing else.
      - The JSON MUST have exactly these keys:
        - "marker": MUST be exactly "INVARIANT_MARKER_{target_label}"
        - "content": ONLY a valid C boolean expression for the invariant (string), without "assert(...)", without "assume(...)", and without a trailing semicolon.

      Not allowed:
      - forall and exists quantifiers
      - Any surrounding "assert"/"assume"
      - Trailing semicolon
      - English text, explanations, code blocks, extra lines

      Example output:
      {{"marker":"INVARIANT_MARKER_{target_label}","content":"x >= 0 && y <= n"}}

      Program:
      ```c
      {program}
      ```

