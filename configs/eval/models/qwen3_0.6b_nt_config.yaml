label: qwen3_0.6b_nt
client: hf # or hf / vllm / openrouter
eval_ft_model: false

base_model: 
  id: "Qwen/Qwen3-0.6B"
  attn_implementation: "flash_attention_2"
  sampling_params:
    max_new_tokens: 1024
    temperature: 0.7
    top_p: 0.8
    top_k: 20
    min_p: 0
    repetition_penalty: 1.1
  extra_body: 
    enable_thinking: false
    

ft_model:
  sft_version: "v0"
  id: "idopinto/qwen3-0.6b-nt-gen-inv-sft-${.sft_version}-latest"
  is_lora: false

