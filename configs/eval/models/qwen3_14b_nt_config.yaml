label: qwen3_14b_nt
client: hf # or hf / vllm / openrouter
eval_ft_model: false

base_model: 
  id: "Qwen/Qwen3-14B"
  attn_implementation: "flash_attention_2"
  sampling_params:
    max_new_tokens: 1024
    temperature: 0.7
    top_p: 0.8
    top_k: 20
    min_p: 0
    repetition_penalty: 1.1
  extra_body: 
    enable_thinking: false
    

ft_model:
  sft_version: "v2.2"
  id: "idopinto/qwen3-14b-nt-gen-inv-sft-${.sft_version}"
  is_lora: true

# Qwen3-14B evaluation examples
# sbatch --job-name=me_qwen14b scripts/eval/run_multi_eval.sbatch --num_runs=3 dataset.limit=-1 models=qwen3_14b_nt_config
# sbatch --job-name=me_qwen14b_v22 scripts/eval/run_multi_eval.sbatch --num_runs=3 dataset.limit=-1 models=qwen3_14b_nt_config models.eval_ft_model=true models.ft_model.sft_version="v2.2"
