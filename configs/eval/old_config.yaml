# Weave configuration
weave:
  entity: "ip-ai"
  project_name: "eval-inv-gen"
  skip_wandb: False

# Evaluation configuration
dataset:
  name: "idopinto/invbench-evaluation-uautomizer25-k3"
  limit: -1 # number of samples to evaluate -1 for all
  prefix: "" # prefix to filter files by (useful for testing also)
  split: "hard" # split to evaluate on

# Model configuration
model: 
  client: hf  # or hf
  eval_finetuned_model: False
  base_model_name: "openai/gpt-oss-20b"
  finetuned_model_id: "idopinto/gpt-oss-20b-gen-inv-sft"
  reasoning_effort: "medium"
  sampling_params:
    max_new_tokens: 16384
    temperature: 1.0
    top_p: 1.0
    top_k: 0.0
  is_lora: True
  # vLLM-specific config (only used when client=vllm)
  vllm_base_url: "http://localhost:8000/v1"
  vllm_model: "gen_inv_adapter"  # LoRA adapter name or base model name

# Scorer configuration
scorer:
  verifier:
    version: "25"
    property: "unreach-call.prp"
    arch: "32bit"
    timeout_seconds: 600.0
  baseline_is_timeout: False

# Prompt templates
prompts:
  only_loop_beginnings: True  # If True, only mark lines at the beginning of loops

  default_system_prompt: |
    You are an expert C programmer and highly profiecient in generating strong loop invariants for C programs that accelerates traditional verifiers.

  default_user_prompt_template: |
    Generate a single candidate invariant for a given C program. you can place it at any of the marked lines with // Line <letter>, choose the most beneficial location:
    ```c
    {program}
    ```
    Answer only the invariant in the following format and nothing else:
    assert(<invariant>); // Line <letter>

    Example:
    assert(a > 0 && a < 10); // Line A

  # Prompt for per-location evaluation (model generates invariant at a specific given location)
  per_location_user_prompt_template: |
    Generate a single candidate invariant for the given C program at the marked location // Line {target_label}:
    ```c
    {program}
    ```
    Answer only the invariant in the following format and nothing else:
    assert(<invariant>);

    Example:
    assert(a > 0 && a < 10);