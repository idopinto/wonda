# Configuration for baseline training dataset creation (AST-based)
# Used by: wonda/preprocess/build_raw_train_dataset.py

# Dataset configuration
dataset:
  type: "train"  # Fixed to "train" for this script
  limit: -1  # Limit the number of files to process (useful for testing). Processes first k files. -1 for all
  prefix: ""  # Filter files by prefix (used for testing specific files)

# UAutomizer verifier configuration
verifier:
  version: "25"  # UAutomizer version: "23", "24", "25", or "26"
  arch: "32bit"  # Architecture: "32bit" or "64bit"
  property: "unreach-call.prp"  # Path to the property file (relative to PROPERTIES_DIR)
  timeout: 600.0  # Timeout threshold for UAutomizer in seconds
  k: 3  # Number of times to run UAutomizer for each file (to avoid outliers)

# Processing configuration
processing:
  ignore_invariants: false  # Do not extract invariants from log/witness files (default: extract invariants)
  difficulty_threshold: 30  # Difficulty threshold for easy/hard split in seconds

# Output configuration (change hf_organization to your own if you're not the author)
output:
  push_to_hub: true
  hf_organization: "idopinto"
  test_mode: false  # Run the script in test mode (affects output directory naming)

# Example usage:
# uv run -m wonda.preprocess.build_raw_train_dataset output.test_mode=true dataset.limit=1 verifier.k=1 output.push_to_hub=true
# sbatch command:
# sbatch scripts/preprocess/build_raw_train_dataset.sh output.test_mode=false dataset.limit=-1 verifier.k=1 output.push_to_hub=true