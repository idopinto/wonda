# Configuration for baseline training dataset creation (AST-based)
# Used by: src/preprocess/build_baseline_train_dataset.py

# Dataset configuration
dataset:
  preprocessed_invariants_path: "data/train/invbench-train-uautomizer25-k1-full-raw/invbench-train-uautomizer25-k1-full-cleaned.json"
  limit: -1  # Limit the number of files to process (useful for testing). Processes first k files. -1 for all
  prefix: ""  # Filter files by prefix (used for testing specific files)

# Output configuration
output:
  preprocessed_invariants_path: "data/train/invbench-train-uautomizer25-k1-full-raw/invbench-train-uautomizer25-k1-full-cleaned.json"
  per_location_task_output_dir: "data/train/invbench-train-uautomizer25-k1-full-raw/invbench-train-uautomizer25-k1-perloc-full-cleaned"
  push_to_hub: true  # Push the dataset to the Hugging Face hub
  test_mode: false  # Run the script in test mode (affects output directory naming)

prompts:
  system: |
    You are an expert C programmer and highly proficient in generating strong loop invariants for C programs that accelerates traditional verifiers.
  any_location:
      user: |
        You are given a C program instrumented with loop markers of the form:
        - INVARIANT_MARKER_k();  (appears at the *start of each loop body*)
        The program also contains a target property as a normal assertion:
        - assert(<target_property>);

        Task:
        - Propose ONE loop invariant that is intended to hold specifically at the loop head marker:
          INVARIANT_MARKER_{target_label}
        - The invariant should help prove the target property and be inductive if possible.

        Output format (STRICT JSON):
        - Output MUST be a single JSON object on one line and nothing else.
        - The JSON MUST have exactly these keys:
          - "marker": MUST be exactly "INVARIANT_MARKER_{target_label}"
          - "content": ONLY a valid C boolean expression for the invariant (string), without "assert(...)", without "assume(...)", and without a trailing semicolon.

        Not allowed:
        - conditional (ternary) operator
        - increment/decrement operators (++/--)
        - forall and exists quantifiers
        - Any surrounding "assert"/"assume"
        - Trailing semicolon
        - English text, explanations, code blocks, extra lines
        - Unbalanced parentheses
        - Unnecessary type casts

        Example output:
        {{"marker":"INVARIANT_MARKER_{target_label}","content":"x >= 0 && y <= n"}}

        Program:
        ```c
        {program}
        ```

  per_location:
      user: |
        You are given a C program instrumented with loop markers of the form:
        - INVARIANT_MARKER_k();  (appears at the *start of each loop body*)
        The program also contains a target property as a normal assertion:
        - assert(<target_property>);

        Task:
        - Propose ONE loop invariant that is intended to hold specifically at the loop head marker:
          INVARIANT_MARKER_{target_label}
        - The invariant should help prove the target property and be inductive if possible.

        Output format (STRICT JSON):
        - Output MUST be a single JSON object on one line and nothing else.
        - The JSON MUST have exactly these keys:
          - "marker": MUST be exactly "INVARIANT_MARKER_{target_label}"
          - "content": ONLY a valid C boolean expression for the invariant (string), without "assert(...)", without "assume(...)", and without a trailing semicolon.

        Not allowed:
        - Any surrounding "assert"/"assume"
        - Trailing semicolon
        - English text, explanations, code blocks, extra lines

        Example output:
        {{"marker":"INVARIANT_MARKER_{target_label}","content":"x >= 0 && y <= n"}}

        Program:
        ```c
        {program}
        ```

# Example usage:
# uv run -m src.preprocess.build_train_dataset output.test_mode=true dataset.limit=1 verifier.k=1 output.push_to_hub=true
# sbatch command:
# sbatch scripts/preprocess/build_raw_train_dataset.sh output.test_mode=false dataset.limit=-1 verifier.k=1 output.push_to_hub=true