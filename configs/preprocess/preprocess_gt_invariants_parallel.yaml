weave:
  entity: "ip-ai"
  project_name: "preprocess-gt-invariants-parallel-latest"
  use_weave: true

verifier:
  version: "25"
  arch: "32bit"
  property: "unreach-call.prp"
  timeout: 600.0
  max_parallel_workers: 5  # Should equal model.n (N candidates verified in parallel)

model:
  name: "moonshotai/Kimi-K2-Thinking"
  temperature: 1.0
  max_tokens: 32768 
  # n: 5  # Number of candidates to generate per verbose invariant
  
pipeline:
    prettify: true
    simplify: true
    verify: true

dataset:
  name: "data/train/invbench-train-uautomizer25-k1-full-raw/invbench-train-uautomizer25-k1-full-raw.json"
  limit: -1  # Number of samples to process (-1 for all)

# Output configuration
output:
  preprocessed_invariants_path: "data/train/invbench-train-uautomizer25-k1-full-raw/invbench-train-uautomizer25-k1-full-parallel-latest.json"
  push_to_hub: true  # Push the dataset to the Hugging Face hub
  hub_name: "invbench-train-uautomizer25-k1-full-parallel-latest"  # Optional: custom hub name (defaults to dataset name from output path)
  hub_organization: "idopinto"

prompts:  
  simplify_invariant_system_prompt: |
    You are an expert C programmer and highly proficient in formal verification of C software.
    
    ## Input format
    - c program: A C program instrumented with loop markers of the form: 
      ```c
      INVARIANT_MARKER_k();  // appears at the *start of each loop body*
      ```
      - The program contains a single target property as an assertion of the form:
      ```c
      assert(<target_property>);
      ```
    - invariant: A loop invariant that uautomizer generated for the program when trying to prove the target property.
    - marker: The marker for the invariant. The invariant is intended to hold specifically at this loop head marker

    ## Task
    Given the C program and the invariant, your task is to simplify the invariant to a more compact and general form.

    ## Output format
    - Output MUST be a single JSON object.
    - The JSON MUST have exactly these keys:
      - "simplified_invariant": A single compact, inductive, C boolean expression, nothing else.
      - "rationale": A short explanation of why you simplified the invariant to the given form.
    ## Output format example
    {"simplified_invariant":"<simplified_invariant>","rationale":"<rationale>"}

    ## Guidelines
    - The simplified invariant should be logically weaker than (or equivalent to) the original, but still inductive and strong enough to prove the target property.
    - Prefer LINEAR arithmetic expressions (the verifier struggles with non-linear math like x*y)
    - Prefer mathematical relationships over case enumeration
    - Look for patterns across disjuncts (e.g., repeated structure with varying constants)
    - Generalize enumerated values to ranges (e.g., "i == 1 || i == 2 || i == 3" -> "1 <= i && i <= 3")
    - Remove tautological constraints (e.g., "a == a", "n <= n", "0 <= 0", "a + 0 == a", "true", "1")
    - Remove constraints on constant variables (variables initialized but never modified in loops)
    - Replace redundant constraints with simpler equivalents (e.g., "a <= b && b <= a" -> "a == b")
    - Ensure the simplified invariant is still inductive (holds before loop and preserved by each iteration)
    - Use the program context to understand variable semantics and loop structure
    - Use ONLY plain ASCII characters in your output (no Unicode symbols)

  simplify_invariant_user_prompt: |
    Simplify the following invariant for the given C program and marker.
    c_program:
    ```c
    {program}
    ```
    invariant:
    ```c
    {invariant}
    ```
    marker:
    ```c
    {marker}
    ```

  # Real examples from training data
  # few_shot_examples:
  #   Simple enumeration → range
  #   - input: |
  #       b == 1 && 5 == i || b == 1 && 2 == i || b == 1 && i == 4 || b == 1 && 3 == i || b == 1 && i == 1 || b == 1 && 6 == i
  #     output: "1 <= i && i <= 6"
  #     explanation: "Enumerated values of i from 1-6, generalize to range. b == 1 is redundant since it is always true."

  #   # Bounds with shared constraint
  #   - input: |
  #       0 <= b && i == 1 && b <= 10 && a <= 10 && 0 <= a && sum_b == 0 || 0 <= b && b <= 10 && a <= 10 && 2 <= i && 0 <= a && 0 <= sum_b || 0 <= b && i == 0 && b <= 10 && a <= 10 && 0 <= a && sum_b == 0
  #     output: "0 <= a && a <= 10 && 0 <= b && b <= 10 && i >= 0 && sum_b >= 0"
  #     explanation: "Extract common bounds, generalize i values"

  #   # Search result tracking
  #   - input: |
  #       target == 10 && 5 == size && res == 0 && i == 0 || target == 10 && 5 == size && i == 1 && res <= 1 || target == 10 && 5 == size && 2 == i && res <= 3 || 5 == size && 3 < i
  #     output: "i >= 0 && res >= 0"
  #     explanation: "Simplify to basic bounds. size == 5 and target == 10 are redundant since they are always true."

# Filtering criteria for identifying verbose invariants that need generalization
filtering:
  min_disjuncts: 3          # Minimum || clauses to consider for generalization
  max_disjuncts: 500        # Skip if too many (likely pathological)
  min_char_length: 100      # Minimum length to consider verbose
  max_char_length: 30000    # Skip extremely long ones

# Example usage:
# uv run -m src.preprocess.preprocess_gt_invariants_parallel dataset.limit=1
# uv run -m src.preprocess.preprocess_gt_invariants_parallel dataset.limit=-1  # Process all
# uv run -m src.preprocess.preprocess_gt_invariants_parallel model.n=10  # More candidates
#     - Prefer using LINEAR arithmetic expressions (the verifier struggles with non-linear math)
