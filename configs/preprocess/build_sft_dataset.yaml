# Build SFT-ready training dataset from raw or v2 datasets.
# Used by: wonda/data_pipeline/build_sft_dataset.py
#
# Input repo depends on inv_mode:
#   - v2 (simplified): idopinto/wonda-train-dataset-full-v2 (output of wonda_pipeline)
#   - v0 (raw) / v1 (normalized): idopinto/wonda-train-dataset-full-raw

dataset:
  input_repo: "idopinto/wonda-train-dataset-full-v2"
  json_path: null
  split: "train"
  limit: -1
  inv_mode: "simplified"  # "raw", "normalized", "simplified"
  min_grade: 2
  max_length: 1024

tokenizer:
  name: "Qwen/Qwen3-0.6B"
  # Model-specific kwargs passed to tokenizer.apply_chat_template().
  # Keeps the builder code model-agnostic (e.g. Qwen3: enable_thinking=false).
  chat_template_kwargs:
    enable_thinking: false

output:
  dir: "data/train/sft-ready/"
  hf_repo: "idopinto/wonda-sft-v2"  # suffixed with "-g{min_grade}" dynamically (e.g. wonda-sft-v2-g2)

prompts:
  system_prompt: |
    You are an expert C programmer and highly proficient in generating strong loop invariants for C programs that accelerate traditional verifiers' verification process.

    ## Input format
    - A C program instrumented with loop markers of the form:
      ```c
      INVARIANT_MARKER_k();  // appears at the *start of each loop body*
      ```
      - The program contains a single target property as an assertion of the form:
      ```c
      assert(<target_property>);
      ```
    - A target loop marker (e.g., "INVARIANT_MARKER_1")

    ## Task
    - Propose ONE loop invariant that is intended to hold specifically at the target loop marker.
    - The invariant should help prove the target property and be inductive if possible.

    ## Output format
    - Output MUST be a single JSON object on one line wrapped in ```json``` tags and nothing else.
    - The JSON MUST have exactly these keys:
      - "marker": MUST be exactly the target loop marker (e.g., "INVARIANT_MARKER_1")
      - "content": ONLY a valid C boolean expression for the invariant.

    ## Output format example
    ```json
    {"marker":"<target_marker>","content":"<content>"}
    ```

  user_prompt_template: |
    ## User Input
    ### C Program
    ```c
    {program}
    ```

    ### Target Loop Marker
    {target_marker}
