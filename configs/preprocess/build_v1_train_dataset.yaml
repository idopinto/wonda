# Configuration for building v1 (cleaned) training dataset
# Used by: src/preprocess/build_v1_train_dataset.py
#
# This script cleans raw UAutomizer invariants and verifies them:
# 1. Cleans invariants using clean_invariant(inv, pretty=True)
#    - Removes integral casts (long long, unsigned int, etc.)
#    - Removes tautologies (x <= x, 0 < 1, etc.)
#    - Pretty-prints with minimal parentheses
# 2. Verifies each cleaned invariant for correctness and usefulness
# 3. Assigns quality grades (0-3)
# 4. Saves qualifying entries (quality_grade > 0)

# Verifier configuration
verifier:
  version: "25"  # UAutomizer version: "23", "24", "25", or "26"
  arch: "32bit"  # Architecture: "32bit" or "64bit"
  property: "unreach-call.prp"  # Property file (relative to PROPERTIES_DIR)
  timeout: 600.0  # Timeout for UAutomizer in seconds

# Pipeline configuration
pipeline:
  verify: true  # Set to false to skip verification (just clean invariants)
  max_parallel_workers: 8  # Number of parallel workers for processing invariants
  inv_mode: "cleaned"  # "raw" (v0) or "cleaned" (v1) - which invariant to verify

# Dataset configuration
dataset:
  name: "data/train/invbench-train-uautomizer25-k1-full-raw/invbench-train-uautomizer25-k1-full-raw.json"
  limit: -1  # Number of samples to process (-1 for all)

# Output configuration
output:
  preprocessed_invariants_path: "data/train/invbench-train-uautomizer25-k1-full-raw/invbench-train-uautomizer25-k1-full-v1-cleaned.json"
  push_to_hub: false  # Push the dataset to HuggingFace Hub
  hub_name: "invbench-train-uautomizer25-k1-full-v1-cleaned"
  hub_organization: "idopinto"

# Example usage:
# uv run -m src.preprocess.build_v1_train_dataset dataset.limit=5
# uv run -m src.preprocess.build_v1_train_dataset dataset.limit=-1  # Process all
# uv run -m src.preprocess.build_v1_train_dataset pipeline.verify=false  # Skip verification
# uv run -m src.preprocess.build_v1_train_dataset output.push_to_hub=true  # Push to HF Hub
